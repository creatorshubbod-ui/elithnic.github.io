<!DOCTYPE html>
<html>
<head><title>Login</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{background:#0b0f1a;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh}input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #374151;background:#111827;color:#fff}button{background:#7c3aed;border:none;font-weight:600;cursor:pointer}.box{width:320px;padding:30px;background:#111827;border-radius:16px}</style>
</head>
<body>
<div class="box">
<h2>Closer Login</h2>
<input id="user" placeholder="Name or Closer ID">
<input id="pass" type="password" placeholder="Password (default: 1234)">
<button onclick="login()">Login</button>
<p id="err" style="color:#ef4444;font-size:14px"></p>
<p style="font-size:12px;color:#9ca3af;margin-top:20px">New? <a href="apply.html" style="color:#7c3aed">Apply here</a></p>
</div>
<script>
function login(){
 const u=user.value.trim();
 let closers=JSON.parse(localStorage.getItem('approved_closers')||'[{"name":"Closer 1","pass":"1234"},{"name":"Closer 2","pass":"1234"},{"name":"Closer 3","pass":"1234"}]');
 let found=closers.find(c=>c.name.toLowerCase()===u.toLowerCase());
 if(found && pass.value===found.pass){
   localStorage.setItem('current_closer',u);
   location.href='dashboard.html';
 }else{err.innerText='Invalid or not approved yet';}
}
</script>
</body>
</html>
